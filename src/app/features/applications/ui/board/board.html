<div cdkDropListGroup class="flex gap-4 overflow-x-auto pb-4">
  @for (column of columns(); track column.status) {
    <app-board-column
      [columnId]="column.status"
      [label]="column.label"
      [connectedTo]="columnIds()"
      [applications]="applicationsByStatus()[column.status]"
      (dropped)="dropped.emit({ status: column.status, event: $event })"
      (edit)="edit.emit($event)"
    />
  }
</div>
