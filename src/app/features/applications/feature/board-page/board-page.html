<app-quick-add-form (added)="onQuickAdd($event)" />

@if (mutationError(); as message) {
  <div class="mb-4 flex items-center gap-3 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
    <span>{{ message }}</span>
    <button type="button" (click)="onDismissMutationError()" class="font-medium underline hover:no-underline">
      Dismiss
    </button>
  </div>
}

@if (loading()) {
  <p class="text-sm text-slate-500">Loading your applications…</p>
} @else if (error(); as message) {
  <div class="flex items-center gap-3 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
    <span>{{ message }}</span>
    <button type="button" (click)="onRetryLoad()" class="font-medium underline hover:no-underline">
      Retry
    </button>
  </div>
} @else {
  <app-board
    [columns]="columns"
    [applicationsByStatus]="applicationsByStatus()"
    (dropped)="onDropped($event)"
    (edit)="onEdit($event)"
  />
}

@if (lastMove()) {
  <app-undo-toast [message]="undoMessage()" (undo)="onUndo()" />
}

@if (editingApplication(); as application) {
  <app-application-edit-modal
    [application]="application"
    (save)="onSaveEdit($event)"
    (delete)="onDeleteEdit()"
    (close)="onCloseEdit()"
  />
}
