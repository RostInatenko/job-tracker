<article
  (click)="edit.emit(application())"
  class="cursor-pointer rounded-md border border-slate-200 bg-white p-3 shadow-sm transition-shadow hover:border-slate-300 hover:shadow-md"
>
  <div class="flex items-start justify-between gap-2">
    <p class="font-medium text-slate-900">{{ application().company }}</p>
    <button
      type="button"
      (click)="onEditClick($event)"
      class="shrink-0 rounded px-1.5 py-0.5 text-xs font-medium text-slate-500 hover:bg-slate-100 hover:text-slate-700"
    >
      Edit
    </button>
  </div>
  <p class="text-sm text-slate-600">{{ application().role }}</p>
  <p class="mt-2 text-xs text-slate-400">{{ application().dateApplied | date: 'mediumDate' }}</p>

  @if (application().notes) {
    <p class="mt-2 text-xs text-slate-500">{{ application().notes }}</p>
  }

  @if (application().link) {
    <a
      [href]="application().link"
      target="_blank"
      rel="noopener noreferrer"
      (click)="$event.stopPropagation()"
      class="mt-2 inline-block text-xs text-blue-600 hover:underline"
    >
      View posting
    </a>
  }
</article>
